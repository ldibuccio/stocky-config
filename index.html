<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stocky Settings</title>
<style>
  :root {
    --bg: #ffffff;
    --bg2: #f5f7fa;
    --primary: #4ba0db;
    --primary-dark: #2d6a9f;
    --text: #1f2d3d;
    --dim: #6c7a89;
    --border: #d8dde2;
    --green: #1f8a3a;
    --red: #b21f24;
    --warning: #c97e0b;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
    background: var(--bg2);
    color: var(--text);
    line-height: 1.4;
    padding: 16px;
    max-width: 600px;
    margin-left: auto;
    margin-right: auto;
  }
  h1 {
    font-size: 22px;
    margin: 0 0 4px 0;
    color: var(--primary-dark);
  }
  .subtitle {
    color: var(--dim);
    font-size: 13px;
    margin-bottom: 12px;
  }

  /* DEBUG PANEL */
  .debug-panel {
    background: #fffbe6;
    border: 2px solid var(--warning);
    border-radius: 8px;
    padding: 12px;
    margin-bottom: 16px;
    font-family: monospace;
    font-size: 13px;
    color: var(--text);
  }
  .debug-title {
    font-weight: 700;
    color: var(--warning);
    margin-bottom: 6px;
    font-size: 14px;
  }
  .debug-row { margin: 3px 0; }
  .debug-ok { color: var(--green); font-weight: 600; }
  .debug-bad { color: var(--red); font-weight: 600; }
  .debug-raw {
    background: #fff;
    border: 1px solid #ddd;
    border-radius: 4px;
    padding: 6px;
    margin-top: 6px;
    word-break: break-all;
    font-size: 11px;
    max-height: 80px;
    overflow-y: auto;
  }

  .section {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 10px;
    padding: 16px;
    margin-bottom: 16px;
  }
  .section-title {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 12px;
    color: var(--text);
  }
  label {
    display: block;
    font-size: 13px;
    color: var(--dim);
    margin-bottom: 4px;
  }
  input[type="text"],
  input[type="number"],
  input[type="password"] {
    width: 100%;
    padding: 10px 12px;
    border: 1px solid var(--border);
    border-radius: 6px;
    font-size: 15px;
    background: var(--bg);
    color: var(--text);
  }
  input:focus { outline: none; border-color: var(--primary); }
  button {
    border: none;
    padding: 10px 16px;
    border-radius: 6px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    transition: opacity 0.15s;
  }
  button:hover { opacity: 0.85; }
  .btn-primary { background: var(--primary); color: white; }
  .btn-secondary { background: var(--bg2); color: var(--text); border: 1px solid var(--border); }
  .btn-danger { background: var(--red); color: white; }
  .btn-icon {
    background: transparent;
    border: none;
    color: var(--red);
    font-size: 18px;
    padding: 4px 8px;
    cursor: pointer;
  }
  .btn-small { padding: 6px 10px; font-size: 13px; }

  .tabs {
    display: flex;
    gap: 4px;
    overflow-x: auto;
    border-bottom: 1px solid var(--border);
    margin-bottom: 12px;
    padding-bottom: 0;
  }
  .tab {
    background: transparent;
    border: none;
    padding: 8px 14px;
    font-size: 14px;
    font-weight: 500;
    cursor: pointer;
    color: var(--dim);
    border-bottom: 2px solid transparent;
    white-space: nowrap;
    border-radius: 0;
  }
  .tab.active {
    color: var(--primary-dark);
    border-bottom-color: var(--primary);
  }
  .tab-add { color: var(--primary); font-weight: 700; }

  .portfolio-name-row {
    display: flex;
    gap: 8px;
    margin-bottom: 12px;
    align-items: center;
  }
  .portfolio-name-row input { flex: 1; }

  .ticker-row {
    display: grid;
    grid-template-columns: 1fr 80px 100px 32px;
    gap: 8px;
    align-items: center;
    margin-bottom: 8px;
  }
  .ticker-row input { padding: 8px; font-size: 14px; }
  .ticker-row .symbol-input { text-transform: uppercase; }

  .ticker-header {
    display: grid;
    grid-template-columns: 1fr 80px 100px 32px;
    gap: 8px;
    font-size: 11px;
    color: var(--dim);
    text-transform: uppercase;
    font-weight: 600;
    margin-bottom: 6px;
    padding: 0 4px;
  }

  .add-ticker-btn {
    background: var(--bg2);
    border: 1px dashed var(--border);
    color: var(--primary-dark);
    width: 100%;
    margin-top: 8px;
    padding: 10px;
  }

  .counter {
    text-align: right;
    font-size: 12px;
    color: var(--dim);
    margin-top: 8px;
  }
  .counter.warning { color: var(--warning); }
  .counter.error { color: var(--red); }

  .status {
    padding: 10px 12px;
    border-radius: 6px;
    margin-bottom: 12px;
    font-size: 14px;
    display: none;
  }
  .status.show { display: block; }
  .status.success { background: #e7f5ec; color: var(--green); border: 1px solid #b8e0c4; }
  .status.error { background: #fde9ea; color: var(--red); border: 1px solid #f5b7b9; }

  .save-bar {
    position: sticky;
    bottom: 0;
    background: var(--bg);
    padding: 12px;
    margin: 20px -16px -16px -16px;
    border-top: 1px solid var(--border);
    display: flex;
    gap: 10px;
    z-index: 10;
  }
  .save-bar button { flex: 1; }
</style>
</head>
<body>

<h1>Stocky Settings</h1>
<div class="subtitle">Configurá tu API key y tus portfolios</div>

<!-- DEBUG PANEL -->
<div class="debug-panel">
  <div class="debug-title">🔍 DEBUG INFO</div>
  <div id="debugContent">Cargando...</div>
</div>

<div id="status" class="status"></div>

<!-- API KEY -->
<div class="section">
  <div class="section-title">Finnhub API Key</div>
  <label for="apiKey">Tu API key (gratis en finnhub.io)</label>
  <input type="password" id="apiKey" placeholder="cxxxxxxxxxxxxxxxxxx" autocomplete="off">
</div>

<!-- PORTFOLIOS -->
<div class="section">
  <div class="section-title">Portfolios</div>
  <div id="tabsContainer" class="tabs" style="display:none;"></div>
  <div id="portfolioEditor"></div>
  <div class="counter" id="globalCounter">0 / 20 tickers totales</div>
</div>

<!-- SAVE -->
<div class="save-bar">
  <button class="btn-secondary" onclick="cancelChanges()">Cancelar</button>
  <button class="btn-primary" onclick="save()">Guardar</button>
</div>

<script>
const MAX_PORTFOLIOS = 5;
const MAX_TICKERS_TOTAL = 20;

let state = {
  apiKey: '',
  portfolios: [],
  activeIdx: 0
};

let debugInfo = {
  hashReceived: false,
  hashRawLength: 0,
  hashRawSample: '',
  parsedOK: false,
  parseError: '',
  apiKeyPresent: false,
  portfoliosCount: 0,
  totalTickers: 0,
  hadOldFormat: false
};

function renderDebug() {
  var html = '';
  html += '<div class="debug-row">Hash recibido: <span class="' + (debugInfo.hashReceived ? 'debug-ok' : 'debug-bad') + '">' + (debugInfo.hashReceived ? 'SI' : 'NO') + '</span></div>';
  if (debugInfo.hashReceived) {
    html += '<div class="debug-row">Largo hash: ' + debugInfo.hashRawLength + ' chars</div>';
    html += '<div class="debug-row">JSON parseo: <span class="' + (debugInfo.parsedOK ? 'debug-ok' : 'debug-bad') + '">' + (debugInfo.parsedOK ? 'OK' : 'FALLO') + '</span></div>';
    if (debugInfo.parseError) {
      html += '<div class="debug-row debug-bad">Error: ' + debugInfo.parseError + '</div>';
    }
  }
  html += '<div class="debug-row">API key del JS: <span class="' + (debugInfo.apiKeyPresent ? 'debug-ok' : 'debug-bad') + '">' + (debugInfo.apiKeyPresent ? 'SI' : 'NO') + '</span></div>';
  html += '<div class="debug-row">Portfolios del JS: ' + debugInfo.portfoliosCount + '</div>';
  html += '<div class="debug-row">Tickers totales: ' + debugInfo.totalTickers + '</div>';
  if (debugInfo.hadOldFormat) {
    html += '<div class="debug-row debug-ok">Formato VIEJO detectado y migrado</div>';
  }
  if (debugInfo.hashRawSample) {
    html += '<div class="debug-row">Hash sample:</div><div class="debug-raw">' + debugInfo.hashRawSample + '</div>';
  }
  document.getElementById('debugContent').innerHTML = html;
}

function loadFromHash() {
  try {
    var hash = window.location.hash.replace('#', '');
    if (!hash) {
      debugInfo.hashReceived = false;
      return;
    }
    debugInfo.hashReceived = true;
    debugInfo.hashRawLength = hash.length;
    debugInfo.hashRawSample = hash.substring(0, 200) + (hash.length > 200 ? '...' : '');
    
    var decoded = decodeURIComponent(hash);
    var parsed = JSON.parse(decoded);
    debugInfo.parsedOK = true;
    
    if (parsed.apiKey) {
      state.apiKey = parsed.apiKey;
      debugInfo.apiKeyPresent = true;
    }
    if (parsed.portfolios && Array.isArray(parsed.portfolios)) {
      state.portfolios = parsed.portfolios;
      debugInfo.portfoliosCount = parsed.portfolios.length;
      var tcount = 0;
      parsed.portfolios.forEach(function(p) {
        if (p.tickers) tcount += p.tickers.length;
      });
      debugInfo.totalTickers = tcount;
    } else if (parsed.portfolio && Array.isArray(parsed.portfolio)) {
      // Migración formato viejo
      state.portfolios = [{ name: 'Default', tickers: parsed.portfolio }];
      debugInfo.hadOldFormat = true;
      debugInfo.portfoliosCount = 1;
      debugInfo.totalTickers = parsed.portfolio.length;
    }
  } catch (e) {
    debugInfo.parsedOK = false;
    debugInfo.parseError = e.message || String(e);
  }
}

function ensureAtLeastOnePortfolio() {
  if (state.portfolios.length === 0) {
    state.portfolios.push({ name: 'Default', tickers: [] });
  }
}

function countTotalTickers() {
  var total = 0;
  state.portfolios.forEach(function(p) { total += p.tickers.length; });
  return total;
}

function render() {
  ensureAtLeastOnePortfolio();
  if (state.activeIdx >= state.portfolios.length) state.activeIdx = state.portfolios.length - 1;
  if (state.activeIdx < 0) state.activeIdx = 0;
  
  document.getElementById('apiKey').value = state.apiKey;
  renderTabs();
  renderEditor();
  renderCounter();
  renderDebug();
}

function renderTabs() {
  var container = document.getElementById('tabsContainer');
  if (state.portfolios.length < 2 && state.portfolios.length < MAX_PORTFOLIOS) {
    if (state.portfolios.length === 1) {
      container.style.display = 'flex';
      container.innerHTML = '';
      var t = document.createElement('button');
      t.className = 'tab active';
      t.textContent = state.portfolios[0].name || 'Default';
      container.appendChild(t);
      var addBtn = document.createElement('button');
      addBtn.className = 'tab tab-add';
      addBtn.textContent = '+ Nuevo';
      addBtn.onclick = addPortfolio;
      container.appendChild(addBtn);
      return;
    }
    container.style.display = 'none';
    container.innerHTML = '';
    return;
  }
  container.style.display = 'flex';
  container.innerHTML = '';
  state.portfolios.forEach(function(p, idx) {
    var t = document.createElement('button');
    t.className = 'tab' + (idx === state.activeIdx ? ' active' : '');
    t.textContent = p.name || 'Sin nombre';
    t.onclick = function() { state.activeIdx = idx; render(); };
    container.appendChild(t);
  });
  if (state.portfolios.length < MAX_PORTFOLIOS) {
    var addBtn = document.createElement('button');
    addBtn.className = 'tab tab-add';
    addBtn.textContent = '+ Nuevo';
    addBtn.onclick = addPortfolio;
    container.appendChild(addBtn);
  }
}

function renderEditor() {
  var editor = document.getElementById('portfolioEditor');
  var p = state.portfolios[state.activeIdx];
  if (!p) { editor.innerHTML = ''; return; }
  
  editor.innerHTML = '';
  
  var nameRow = document.createElement('div');
  nameRow.className = 'portfolio-name-row';
  
  var nameInput = document.createElement('input');
  nameInput.type = 'text';
  nameInput.value = p.name;
  nameInput.placeholder = 'Nombre del portfolio';
  nameInput.maxLength = 20;
  nameInput.oninput = function() { p.name = this.value; };
  nameRow.appendChild(nameInput);
  
  if (state.portfolios.length > 1) {
    var deleteBtn = document.createElement('button');
    deleteBtn.className = 'btn-danger btn-small';
    deleteBtn.textContent = 'Borrar';
    deleteBtn.onclick = function() { deletePortfolio(state.activeIdx); };
    nameRow.appendChild(deleteBtn);
  }
  
  editor.appendChild(nameRow);
  
  var header = document.createElement('div');
  header.className = 'ticker-header';
  header.innerHTML = '<div>Ticker</div><div>Shares</div><div>Avg Cost</div><div></div>';
  editor.appendChild(header);
  
  p.tickers.forEach(function(t, idx) {
    var row = document.createElement('div');
    row.className = 'ticker-row';
    
    var symbolInput = document.createElement('input');
    symbolInput.type = 'text';
    symbolInput.className = 'symbol-input';
    symbolInput.value = t.symbol;
    symbolInput.placeholder = 'AAPL';
    symbolInput.maxLength = 8;
    symbolInput.oninput = function() { t.symbol = this.value.toUpperCase(); };
    row.appendChild(symbolInput);
    
    var sharesInput = document.createElement('input');
    sharesInput.type = 'number';
    sharesInput.value = t.shares;
    sharesInput.placeholder = '10';
    sharesInput.step = '0.01';
    sharesInput.min = '0';
    sharesInput.oninput = function() { t.shares = parseFloat(this.value) || 0; };
    row.appendChild(sharesInput);
    
    var costInput = document.createElement('input');
    costInput.type = 'number';
    costInput.value = t.avgCost;
    costInput.placeholder = '180.00';
    costInput.step = '0.01';
    costInput.min = '0';
    costInput.oninput = function() { t.avgCost = parseFloat(this.value) || 0; };
    row.appendChild(costInput);
    
    var removeBtn = document.createElement('button');
    removeBtn.className = 'btn-icon';
    removeBtn.innerHTML = '×';
    removeBtn.onclick = function() { removeTicker(idx); };
    row.appendChild(removeBtn);
    
    editor.appendChild(row);
  });
  
  var addBtn = document.createElement('button');
  addBtn.className = 'add-ticker-btn';
  addBtn.textContent = '+ Agregar ticker';
  addBtn.onclick = addTicker;
  editor.appendChild(addBtn);
}

function renderCounter() {
  var total = countTotalTickers();
  var counter = document.getElementById('globalCounter');
  counter.textContent = total + ' / ' + MAX_TICKERS_TOTAL + ' tickers totales';
  counter.className = 'counter';
  if (total >= MAX_TICKERS_TOTAL) counter.className = 'counter error';
  else if (total >= MAX_TICKERS_TOTAL - 3) counter.className = 'counter warning';
}

function addPortfolio() {
  if (state.portfolios.length >= MAX_PORTFOLIOS) {
    showStatus('error', 'Máximo ' + MAX_PORTFOLIOS + ' portfolios');
    return;
  }
  state.portfolios.push({ name: 'Portfolio ' + (state.portfolios.length + 1), tickers: [] });
  state.activeIdx = state.portfolios.length - 1;
  render();
}

function deletePortfolio(idx) {
  if (state.portfolios.length <= 1) {
    showStatus('error', 'Necesitás al menos un portfolio');
    return;
  }
  if (!confirm('¿Borrar este portfolio? Se pierden todos sus tickers.')) return;
  state.portfolios.splice(idx, 1);
  if (state.activeIdx >= state.portfolios.length) state.activeIdx = state.portfolios.length - 1;
  render();
}

function addTicker() {
  if (countTotalTickers() >= MAX_TICKERS_TOTAL) {
    showStatus('error', 'Máximo ' + MAX_TICKERS_TOTAL + ' tickers totales. Eliminá uno antes de agregar.');
    return;
  }
  state.portfolios[state.activeIdx].tickers.push({ symbol: '', shares: 0, avgCost: 0 });
  render();
}

function removeTicker(idx) {
  state.portfolios[state.activeIdx].tickers.splice(idx, 1);
  render();
}

function showStatus(type, msg) {
  var status = document.getElementById('status');
  status.className = 'status show ' + type;
  status.textContent = msg;
  setTimeout(function() { status.classList.remove('show'); }, 4000);
}

function validate() {
  var apiKey = document.getElementById('apiKey').value.trim();
  if (!apiKey) {
    showStatus('error', 'Falta la API key de Finnhub');
    return null;
  }
  for (var i = 0; i < state.portfolios.length; i++) {
    var p = state.portfolios[i];
    if (!p.name || !p.name.trim()) {
      showStatus('error', 'El portfolio ' + (i + 1) + ' no tiene nombre');
      state.activeIdx = i;
      render();
      return null;
    }
    for (var j = 0; j < p.tickers.length; j++) {
      var t = p.tickers[j];
      if (!t.symbol || !t.symbol.trim()) {
        showStatus('error', 'Hay un ticker sin símbolo en "' + p.name + '"');
        state.activeIdx = i;
        render();
        return null;
      }
      if (!t.shares || t.shares <= 0) {
        showStatus('error', t.symbol + ' tiene shares inválidos');
        state.activeIdx = i;
        render();
        return null;
      }
      if (!t.avgCost || t.avgCost <= 0) {
        showStatus('error', t.symbol + ' tiene avg cost inválido');
        state.activeIdx = i;
        render();
        return null;
      }
    }
  }
  return { apiKey: apiKey, portfolios: state.portfolios };
}

function save() {
  var config = validate();
  if (!config) return;
  var payload = JSON.stringify(config);
  var url = 'pebblejs://close#' + encodeURIComponent(payload);
  document.location.href = url;
}

function cancelChanges() {
  document.location.href = 'pebblejs://close#';
}

// Init
loadFromHash();
render();

document.getElementById('apiKey').addEventListener('input', function() {
  state.apiKey = this.value;
});
</script>

</body>
</html>
